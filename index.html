<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Negotica AI Legal</title>
  <style>
    :root {
      --bg: #081a2f;
      --card: #0f2f4d;
      --text: #e7f4ff;
      --muted: #9ec7e8;
      --accent: #6be7ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: radial-gradient(circle at 20% 10%, #144770 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(680px, 100%);
      background: color-mix(in srgb, var(--card) 92%, black);
      border: 1px solid #2d5e86;
      border-radius: 20px;
      padding: 28px;
    }
    h1 {
      margin: 0 0 8px;
      color: var(--accent);
      letter-spacing: 0.5px;
    }
    p { margin: 0 0 18px; color: var(--muted); }
    ul {
      margin: 0;
      padding-left: 18px;
      line-height: 1.8;
    }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <main class="card">
    <h1>Negotica AI Legal</h1>
    <p>Official legal pages for Negotica AI.</p>
    <ul>
      <li><a href="./privacy.html">Privacy Policy</a></li>
      <li><a href="./terms.html">Terms of Service</a></li>
    </ul>
  </main>
</body>
</html>
